<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply for Exclusive Access</title>

  <link rel="stylesheet" href="css/apply.css" />

  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600&family=Playfair+Display:wght@500&display=swap"
    rel="stylesheet"
  />
</head>
<body>

  <section class="apply-page">
    <div class="container">

      <div class="header">
        <h1>Apply for Exclusive Access</h1>
        <p>Begin your journey into a private, curated network.</p>
      </div>

      <div class="form-box">
        <form>

          <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your full name" />
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="Enter your email" />
          </div>

          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="Enter your phone number" />
          </div>

          <div class="form-group">
            <label>Age</label>
            <input type="number" placeholder="Enter your age" />
          </div>

          <div class="form-group">
            <label>Profession</label>
            <input type="text" placeholder="Your profession" />
          </div>

          <div class="form-group">
            <label>Your Expectations</label>
            <textarea rows="5" placeholder="Describe what you're looking for"></textarea>
          </div>

          <button type="submit" class="submit-btn">
            Submit Application
          </button>
        </form>

        <p class="privacy-text">Privacy First. Highly Discreet.</p>
      </div>

    </div>
  </section>

</body>
</html>
