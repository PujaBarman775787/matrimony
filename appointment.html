<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Appointment</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/appointment.css">
</head>

<body>

<div class="container">

  <div class="header">
    <h1>Book a Private Appointment</h1>
    <p>Schedule a confidential consultation with our experts.</p>
  </div>

  <div class="form-box">

    <form>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your full name">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email">
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" placeholder="Enter your number">
      </div>

      <div class="form-group">
        <label>Preferred Date</label>
        <input type="date">
      </div>

      <div class="form-group">
        <label>Preferred Time</label>
        <input type="time">
      </div>

      <div class="form-group">
        <label>Service Type</label>
        <select>
          <option>Bespoke Jewelry</option>
          <option>Tailoring Consultation</option>
          <option>Private Matchmaking</option>
        </select>
      </div>

      <div class="form-group">
        <label>Additional Notes</label>
        <textarea rows="4" placeholder="Any special requests..."></textarea>
      </div>

      <button class="btn">Confirm Appointment</button>

    </form>

  </div>

</div>

</body>
</html>
